<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Uttarakhand Travels</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">
<img src="/images/Abstract Mountain Logo (1).png">
<h2>Contact us page </h2>
</div>

</header>

<section class="contact">

<h1 class="title">Contact Us</h1>
<p class="subtitle">Plan your adventure with us</p>

<div class="contact-wrapper">

<!-- FORM -->

<div class="form-box">

<form id="contactForm">

<div class="input-group">
<input type="text" required>
<label>Name</label>
</div>

<div class="input-group">
<input type="email" required>
<label>Email</label>
</div>

<div class="input-group">
<input type="tel">
<label>Phone</label>
</div>

<div class="input-group">
<textarea required></textarea>
<label>Message</label>
</div>

<button type="submit" class="btn">Send Message</button>

</form>

</div>

<!-- CONTACT INFO -->

<div class="info-box">

<div class="info-card">
<h3>📍 Address</h3>
<p>Dehradun, Uttarakhand, India</p>
</div>

<div class="info-card">
<h3>📞 Phone</h3>
<p>+91 9876543210</p>
</div>

<div class="info-card">
<h3>✉ Email</h3>
<p>travel@uttarakhand.com</p>
</div>

</div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
