<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kafall Travels - Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root{
    --green: #259E5C;
    --green-dark: #1b7a44;
    --text-dark: #1a1a3d;
    --gray: #8a8a8a;
    --border: #e5e5e5;
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
  }

  html, body{
    width:100%;
  }

  header{
    width:100%;
    background:#ffffff;
    border-bottom:1px solid var(--border);
    position:relative;
  }

  .nav-wrapper{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 30px;
  }

  /* Logo */
  .logo-box{
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
  }

  .logo-box svg{
    width:68px;
    height:52px;
  }

  .logo-img{
    width:68px;
    height:52px;
    object-fit:contain;
    border-radius:4px;
  }

  .logo-text{
    display:flex;
    flex-direction:column;
    line-height:1.1;
  }

  .logo-text .brand{
    font-family: 'Fraunces', serif;
    font-size:20px;
    font-weight:600;
    color:var(--green);
    letter-spacing:0.2px;
  }

  .logo-text .brand span{
    font-weight:600;
    color:var(--text-dark);
  }

  .logo-text .presents{
    font-size:10px;
    letter-spacing:3px;
    color:var(--gray);
    font-weight:600;
  }

  /* Nav links */
  .nav-links{
    display:flex;
    align-items:center;
    gap:34px;
    list-style:none;
  }

  .nav-links a{
    text-decoration:none;
    color:var(--green);
    font-size:17px;
    font-weight:500;
    white-space:nowrap;
    transition:color 0.2s ease;
  }

  .nav-links a:hover{
    color:var(--text-dark);
  }

  /* Call button */
  .call-box{
    display:flex;
    align-items:center;
    gap:8px;
    border:1.5px solid var(--green);
    border-radius:30px;
    padding:8px 18px;
    text-decoration:none;
    color:var(--green);
    font-weight:600;
    font-size:15px;
    flex-shrink:0;
    transition:background 0.2s ease, color 0.2s ease;
  }

  .call-box:hover{
    background:var(--green);
    color:#fff;
  }

  .call-box:hover svg path{
    fill:#fff;
  }

  .call-box svg{
    width:16px;
    height:16px;
  }

  .call-box svg path{
    fill:var(--green);
    transition:fill 0.2s ease;
  }

  /* Hamburger */
  .hamburger{
    display:none;
    flex-direction:column;
    gap:5px;
    cursor:pointer;
    background:none;
    border:none;
    padding:6px;
    flex-shrink:0;
  }

  .hamburger span{
    width:26px;
    height:3px;
    background:var(--text-dark);
    border-radius:2px;
    transition:all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .hamburger.active span:nth-child(1){
    transform:translateY(8px) rotate(45deg);
  }
  .hamburger.active span:nth-child(2){
    opacity:0;
  }
  .hamburger.active span:nth-child(3){
    transform:translateY(-8px) rotate(-45deg);
  }

  /* Mobile menu panel */
  .mobile-menu{
    display:none;
    flex-direction:column;
    position:absolute;
    top:100%;
    left:0;
    width:100%;
    background:#fff;
    border-top:1px solid var(--border);
    box-shadow:0 12px 20px -8px rgba(0,0,0,0.15);
    overflow:hidden;
    max-height:0;
    opacity:0;
    z-index:999;
    pointer-events:none;
    transition:max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
               opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .mobile-menu.open{
    max-height:500px;
    opacity:1;
    pointer-events:auto;
  }

  .mobile-menu a{
    display:inline-block;
    align-self:center;
    padding:14px 4px;
    text-decoration:none;
    color:var(--text-dark);
    font-size:15px;
    font-weight:500;
    text-align:center;
    border-bottom:1px solid #f2f2f2;
    opacity:0;
    transform:translateY(-8px);
    transition:opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
               transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .mobile-menu.open a{
    opacity:1;
    transform:translateY(0);
  }

  .mobile-menu.open a:nth-child(1){ transition-delay:0.05s; }
  .mobile-menu.open a:nth-child(2){ transition-delay:0.10s; }
  .mobile-menu.open a:nth-child(3){ transition-delay:0.15s; }
  .mobile-menu.open a:nth-child(4){ transition-delay:0.20s; }
  .mobile-menu.open a:nth-child(5){ transition-delay:0.25s; }
  .mobile-menu.open a:nth-child(6){ transition-delay:0.30s; }

  .mobile-menu a:hover{
    color:var(--green);
    background:#fafafa;
  }

  .mobile-call{
    margin:16px 24px;
    justify-content:center;
  }

  /* Responsive */
  @media (max-width: 900px){
    .nav-links{
      display:none;
    }
    .call-box.desktop-call{
      display:none;
    }
    .hamburger{
      display:flex;
    }
    .mobile-menu{
      display:flex;
    }
  }

  @media (max-width: 480px){
    .nav-wrapper{
      padding:12px 16px;
    }
    .logo-text .brand{
      font-size:17px;
    }
    .logo-box svg{
      width:54px;
      height:42px;
    }
    .logo-img{
      width:54px;
      height:42px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="nav-wrapper">

    <!-- Logo -->
    <div class="logo-box">
    <a href="/" target="_self">
    <img src="/images/green logo.png" alt="Kafall Logo" class="logo-img">
    </a>
      <div class="logo-text">
        <span class="brand">kafall</span>
        <span class="presents">Travels</span>

      </div>
    </div>

    <!-- Desktop nav -->
    <ul class="nav-links">
      <li><a href="/aboutus.html">About us</a></li>
      <li><a href="/packages.html">Packages</a></li>
      <li><a href="/chardham.html">Char Dham</a></li>
      <li><a href="/weekendtrip.html">Weekend Trips</a></li>
      <li><a href="/blog.html">Blog</a></li>
      <li><a href="/contact.html">Contact us</a></li>
    </ul>

    <!-- Call button (desktop) -->
    <a href="tel:+919810966202" class="call-box desktop-call">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
      </svg>
      +91 9810966202
    </a>

    <!-- Hamburger -->
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="/aboutus.html">About us</a>
    <a href="/packages.html">Packages</a>
    <a href="/chardham.html">Char Dham</a>
    <a href="/weakendtrip.html">Weekend Trips</a>
    <a href="/blog.html">Blog</a>
    <a href="/contact.html">Contact us</a>
  </div>
</header>

<script>
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const mobileMenu = document.getElementById('mobileMenu');

  hamburgerBtn.addEventListener('click', function(){
    hamburgerBtn.classList.toggle('active');
    mobileMenu.classList.toggle('open');
  });
</script>

</body>
</html>
