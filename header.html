<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kafall Travels - Header</title>
<style>
  :root{
    --green: #00a859;
    --green-dark: #078a4a;
    --text-dark: #1a1a3d;
    --gray: #8a8a8a;
    --border: #e5e5e5;
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  html, body{
    width:100%;
  }

  header{
    width:100%;
    background:#ffffff;
    border-bottom:1px solid var(--border);
  }

  .nav-wrapper{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 30px;
  }

  /* Logo */
  .logo-box{
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
  }

  .logo-box svg{
    width:34px;
    height:26px;
  }

  .logo-img{
    width:34px;
    height:26px;
    object-fit:contain;
    border-radius:4px;
  }

  .logo-text{
    display:flex;
    flex-direction:column;
    line-height:1.1;
  }

  .logo-text .brand{
    font-size:20px;
    font-weight:800;
    color:var(--green);
    letter-spacing:0.2px;
  }

  .logo-text .brand span{
    font-weight:800;
    color:var(--text-dark);
  }

  .logo-text .presents{
    font-size:10px;
    letter-spacing:3px;
    color:var(--gray);
    font-weight:600;
  }

  /* Nav links */
  .nav-links{
    display:flex;
    align-items:center;
    gap:34px;
    list-style:none;
  }

  .nav-links a{
    text-decoration:none;
    color:var(--green);
    font-size:17px;
    font-weight:500;
    white-space:nowrap;
    transition:color 0.2s ease;
  }

  .nav-links a:hover{
    color:var(--text-dark);
  }

  /* Call button */
  .call-box{
    display:flex;
    align-items:center;
    gap:8px;
    border:1.5px solid var(--green);
    border-radius:30px;
    padding:8px 18px;
    text-decoration:none;
    color:var(--green);
    font-weight:600;
    font-size:15px;
    flex-shrink:0;
    transition:background 0.2s ease, color 0.2s ease;
  }

  .call-box:hover{
    background:var(--green);
    color:#fff;
  }

  .call-box:hover svg path{
    fill:#fff;
  }

  .call-box svg{
    width:16px;
    height:16px;
  }

  .call-box svg path{
    fill:var(--green);
    transition:fill 0.2s ease;
  }

  /* Hamburger */
  .hamburger{
    display:none;
    flex-direction:column;
    gap:5px;
    cursor:pointer;
    background:none;
    border:none;
    padding:6px;
    flex-shrink:0;
  }

  .hamburger span{
    width:26px;
    height:3px;
    background:var(--text-dark);
    border-radius:2px;
    transition:all 0.3s ease;
  }

  .hamburger.active span:nth-child(1){
    transform:translateY(8px) rotate(45deg);
  }
  .hamburger.active span:nth-child(2){
    opacity:0;
  }
  .hamburger.active span:nth-child(3){
    transform:translateY(-8px) rotate(-45deg);
  }

  /* Mobile menu panel */
  .mobile-menu{
    display:none;
    flex-direction:column;
    width:100%;
    background:#fff;
    border-top:1px solid var(--border);
    overflow:hidden;
    max-height:0;
    transition:max-height 0.35s ease;
  }

  .mobile-menu.open{
    max-height:500px;
  }

  .mobile-menu a{
    padding:14px 24px;
    text-decoration:none;
    color:var(--text-dark);
    font-size:15px;
    font-weight:500;
    border-bottom:1px solid #f2f2f2;
  }

  .mobile-menu a:hover{
    color:var(--green);
    background:#fafafa;
  }

  .mobile-call{
    margin:16px 24px;
    justify-content:center;
  }

  /* Responsive */
  @media (max-width: 900px){
    .nav-links{
      display:none;
    }
    .call-box.desktop-call{
      display:none;
    }
    .hamburger{
      display:flex;
    }
    .mobile-menu{
      display:flex;
    }
  }

  @media (max-width: 480px){
    .nav-wrapper{
      padding:12px 16px;
    }
    .logo-text .brand{
      font-size:17px;
    }
    .logo-box svg{
      width:28px;
      height:22px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="nav-wrapper">

    <!-- Logo -->
    <div class="logo-box">
      <img src="https://placehold.co/40x30/00a859/ffffff?text=LOGO" alt="Kafall Logo" class="logo-img">
      <div class="logo-text">
        <span class="brand">kafall</span>
        <span class="presents">PRESENTS</span>
      </div>
    </div>

    <!-- Desktop nav -->
    <ul class="nav-links">
      <li><a href="#about">About us</a></li>
      <li><a href="#packages">Packages</a></li>
      <li><a href="#chardham">Char Dham</a></li>
      <li><a href="#weekend">Weekend Trips</a></li>
      <li><a href="#blog">Blog</a></li>
      <li><a href="#contact">Contact us</a></li>
    </ul>

    <!-- Call button (desktop) -->
    <a href="tel:+919810966202" class="call-box desktop-call">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
      </svg>
      +91 9810966202
    </a>

    <!-- Hamburger -->
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#about">About us</a>
    <a href="#packages">Packages</a>
    <a href="#chardham">Char Dham</a>
    <a href="#weekend">Weekend Trips</a>
    <a href="#blog">Blog</a>
    <a href="#contact">Contact us</a>
  </div>
</header>

<script>
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const mobileMenu = document.getElementById('mobileMenu');

  hamburgerBtn.addEventListener('click', function(){
    hamburgerBtn.classList.toggle('active');
    mobileMenu.classList.toggle('open');
  });
</script>

</body>
</html>
